services:
  - type: web
    name: vibe-analyzer-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
